<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Balon Patlatmaca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: white;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            background: inherit;
            overflow: hidden;
        }
        .screen.active { transform: translateX(0); }
        .screen:not(.active) { transform: translateX(100%); display: none; }

        /* Oyun ekranı */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .game-header h1 { font-size: 24px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .search-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .search-btn:active { transform: scale(0.95); }
        .search-panel {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 15px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .search-panel.hidden { display: none; }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .search-input:focus { border: 1px solid #ff6b6b; }
        #searchCloseBtn {
            background: #ff4757;
            border: none;
            color: white;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
        }
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        canvas {
            background: radial-gradient(circle, #ff9a9e, #fad0c4);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 80vw;
            height: 80vw;
            max-width: 350px;
            max-height: 350px;
            cursor: pointer;
        }
        .score-board { text-align: center; margin-top: 20px; }
        .score { font-size: 32px; font-weight: bold; color: #ffd700; }
        .high-score { font-size: 16px; color: #ddd; margin-top: 5px; }
        .game-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
        }
        .game-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .game-btn:active { transform: scale(0.96); }
        .game-btn.primary { background: #ff6b6b; color: white; box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
        .game-btn.secondary { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .game-over {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
            margin-top: -20px;
            animation: bounce 0.5s ease;
        }
        .hidden { display: none; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

        /* Sohbet ekranı */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        .room-info {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        .room-info strong { color: #ffd700; }
        .online-count {
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message-content {
            background: rgba(255,255,255,0.1);
            padding: 10px 14px;
            border-radius: 20px;
            word-break: break-word;
        }
        .message.own .message-content { background: #ff6b6b; }
        .message-sender { font-size: 11px; color: #ffd700; margin-bottom: 4px; }
        .message-text { font-size: 14px; line-height: 1.4; }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 5px;
        }
        .message-video video {
            max-width: 250px;
            max-height: 200px;
            border-radius: 12px;
            background: #000;
        }
        .reply-indicator {
            font-size: 11px;
            color: #aaa;
            padding: 2px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 4px;
        }
        .reaction-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            margin-right: 4px;
            margin-top: 4px;
            cursor: pointer;
        }
        .message-time { font-size: 10px; color: #aaa; margin-top: 4px; text-align: right; }
        .system-message {
            text-align: center;
            background: rgba(255,107,107,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 5px auto;
            width: fit-content;
        }
        .chat-input-area {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .action-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .action-btn:active { transform: scale(0.95); }
        .message-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 25px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            min-width: 120px;
        }
        .send-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .sticker-panel {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .sticker-item {
            font-size: 40px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .fullscreen-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-modal.hidden { display: none; }
        .fullscreen-image {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        .close-fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
        }
        .secure-timer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4757;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        
        /* Responsive - mobil için iyileştirmeler */
        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .sticker-item { font-size: 30px; }
            .action-btn { width: 40px; height: 40px; font-size: 18px; }
            .send-btn { width: 40px; height: 40px; font-size: 16px; }
            .message-input { font-size: 16px; } /* mobilde büyük font klavye rahatlığı */
            .game-header h1 { font-size: 20px; }
            .room-info { font-size: 11px; gap: 8px; }
        }
    </style>
</head>
<body>
    <!-- OYUN EKRANI -->
    <div id="gameScreen" class="screen active">
        <div class="game-header">
            <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
            <h1>Balon Patlatmaca</h1>
        </div>
        <div id="searchPanel" class="search-panel hidden">
            <input type="text" id="searchInput" class="search-input" placeholder="Aramak için yazıp Enter'a basın" autocomplete="off">
            <button id="searchCloseBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="game-area">
            <canvas id="balloonCanvas" width="400" height="400"></canvas>
            <div class="score-board">
                <div class="score">Skor: <span id="currentScore">0</span></div>
                <div class="high-score">En yüksek skor: <span id="highScore">0</span></div>
            </div>
        </div>
        <div class="game-buttons">
            <button id="startGameBtn" class="game-btn primary">Oyuna Başla</button>
            <button id="restartGameBtn" class="game-btn secondary">Yeniden Başla</button>
        </div>
        <div id="gameOverMessage" class="game-over hidden"></div>
    </div>

    <!-- SOHBET EKRANI -->
    <div id="chatScreen" class="screen">
        <div class="chat-header">
            <button id="backToGameBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
            <div class="room-info"><span>Şifre: <strong>efkaza7634</strong></span></div>
            <div class="online-count"><i class="fas fa-users"></i> <span id="onlineCount">0</span></div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <div class="input-actions">
                <button id="stickerBtn" class="action-btn"><i class="fas fa-smile-wink"></i></button>
                <button id="photoBtn" class="action-btn"><i class="fas fa-camera"></i></button>
                <button id="micBtn" class="action-btn"><i class="fas fa-microphone"></i></button>
                <button id="videoBtn" class="action-btn"><i class="fas fa-video"></i></button>
                <input type="text" id="messageInput" class="message-input" placeholder="Mesaj yaz..." autocomplete="off">
                <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div id="stickerPanel" class="sticker-panel hidden">
                <div class="sticker-grid" id="stickerGrid"></div>
                <button id="addStickerBtn" style="margin-top:10px; width:100%; padding:8px; background:#ff6b6b; border:none; border-radius:20px; color:white;">+ Yeni Çıkartma Ekle</button>
            </div>
            <input type="file" id="imageFileInput" accept="image/*" style="display:none">
            <input type="file" id="videoFileInput" accept="video/*" style="display:none">
            <input type="file" id="stickerImageInput" accept="image/*" style="display:none">
        </div>
    </div>

    <!-- TAM EKRAN FOTOĞRAF MODAL -->
    <div id="fullscreenModal" class="fullscreen-modal hidden">
        <button id="closeFullscreenBtn" class="close-fullscreen"><i class="fas fa-times"></i></button>
        <img id="fullscreenImage" class="fullscreen-image" src="">
        <div id="secureTimer" class="secure-timer hidden"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ---------- OYUN MEKANİĞİ ----------
        const canvas = document.getElementById('balloonCanvas');
        const ctx = canvas.getContext('2d');
        let balloonSize = 80;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let gameActive = false;
        let gameInterval = null;
        let balloonX, balloonY;

        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, 350);
            canvas.width = size;
            canvas.height = size;
            balloonX = canvas.width/2;
            balloonY = canvas.height/2;
            drawBalloon();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawBalloon() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.beginPath();
            ctx.ellipse(balloonX, balloonY, balloonSize, balloonSize*1.2, 0, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${Math.min(balloonSize*3, 360)}, 70%, 60%)`;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(balloonX - balloonSize*0.2, balloonY - balloonSize*0.2, balloonSize*0.15, balloonSize*0.1, 0, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(balloonX, balloonY + balloonSize*0.8);
            ctx.lineTo(balloonX-3, balloonY + balloonSize*0.9);
            ctx.lineTo(balloonX+3, balloonY + balloonSize*0.9);
            ctx.fillStyle = '#8B4513';
            ctx.fill();
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(balloonX-15, balloonY+balloonSize*0.85, 30, 12);
        }

        canvas.addEventListener('click', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width/rect.width;
            const scaleY = canvas.height/rect.height;
            const mouseX = (e.clientX - rect.left)*scaleX;
            const mouseY = (e.clientY - rect.top)*scaleY;
            const dx = mouseX - balloonX;
            const dy = mouseY - balloonY;
            if (Math.hypot(dx,dy) < balloonSize) {
                score += 10;
                document.getElementById('currentScore').innerText = score;
                balloonSize += 5;
                if (balloonSize > 150) endGame(false);
                else drawBalloon();
            }
        });

        function startGame() {
            gameActive = true;
            score = 0;
            balloonSize = 70;
            document.getElementById('currentScore').innerText = '0';
            document.getElementById('gameOverMessage').classList.add('hidden');
            drawBalloon();
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (gameActive) {
                    balloonSize += 1;
                    if (balloonSize > 150) endGame(false);
                    else drawBalloon();
                }
            }, 500);
        }
        function endGame(won) {
            gameActive = false;
            if (gameInterval) clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                document.getElementById('highScore').innerText = highScore;
            }
            const msgDiv = document.getElementById('gameOverMessage');
            msgDiv.classList.remove('hidden');
            msgDiv.innerText = won ? '🎉 Kazandın! 🎉' : '💥 Balon Patladı! 💥';
            drawBalloon();
        }
        function resetGame() {
            if (gameInterval) clearInterval(gameInterval);
            gameActive = false;
            score = 0;
            balloonSize = 70;
            document.getElementById('currentScore').innerText = '0';
            document.getElementById('gameOverMessage').classList.add('hidden');
            drawBalloon();
        }
        document.getElementById('startGameBtn').onclick = startGame;
        document.getElementById('restartGameBtn').onclick = resetGame;
        document.getElementById('highScore').innerText = highScore;

        // ---------- ARAMA (ŞİFRE) ----------
        const searchBtn = document.getElementById('searchBtn');
        const searchPanel = document.getElementById('searchPanel');
        const searchInput = document.getElementById('searchInput');
        const searchCloseBtn = document.getElementById('searchCloseBtn');
        searchBtn.onclick = () => searchPanel.classList.toggle('hidden');
        searchCloseBtn.onclick = () => searchPanel.classList.add('hidden');
        let pendingPassword = null;
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const pwd = searchInput.value.trim();
                if (pwd === 'efkaza7634') {
                    searchPanel.classList.add('hidden');
                    searchInput.value = '';
                    let userName = localStorage.getItem('userName');
                    let userPhoto = localStorage.getItem('userPhoto');
                    if (!userName) {
                        userName = prompt('Kullanıcı adınızı girin:');
                        if (!userName) return;
                        localStorage.setItem('userName', userName);
                        const photoInput = prompt('Profil fotoğrafı için bir URL girin (isteğe bağlı):');
                        if (photoInput && photoInput.startsWith('http')) {
                            userPhoto = photoInput;
                            localStorage.setItem('userPhoto', userPhoto);
                        }
                    }
                    connectAndJoin(pwd, userName, userPhoto);
                } else {
                    alert('Şifre yanlış!');
                }
            }
        });

        // ---------- SOCKET VE UYGULAMA ----------
        let socket = null;
        let deviceId = localStorage.getItem('deviceId');
        if (!deviceId) {
            deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2,8);
            localStorage.setItem('deviceId', deviceId);
        }
        let currentStickers = [];

        function connectAndJoin(password, userName, userPhoto) {
            if (socket && socket.connected) return;
            socket = io();
            socket.on('connect', () => {
                console.log('Socket bağlandı');
                if ('serviceWorker' in navigator && 'PushManager' in window) {
                    navigator.serviceWorker.register('/sw.js').then(reg => {
                        reg.pushManager.subscribe({
                            userVisibleOnly: true,
                            applicationServerKey: urlBase64ToUint8Array('BADZTZNjcII3XZYWlPMOTK9ZXIizO6mepKYEhikDJS19eVRFSUinzjTzsR3gvI6w3gKYVvYSYVjRo3GG2vkTkww')
                        }).then(sub => {
                            socket.emit('subscribe-push', { deviceId, subscription: sub.toJSON() });
                        }).catch(e => console.log);
                    });
                }
                socket.emit('create-room', { userName, userPhoto, deviceId, password });
            });
            socket.on('room-ready', (data) => {
                document.getElementById('gameScreen').classList.remove('active');
                document.getElementById('chatScreen').classList.add('active');
                if (data.messages) data.messages.forEach(addMessage);
                if (data.stickers) updateStickerPanel(data.stickers);
                if (data.video) updateVideoUI(data.video);
                if (data.videoVisible !== undefined) toggleVideoSection(data.videoVisible);
            });
            socket.on('error', (msg) => alert('Hata: ' + msg));
            socket.on('user-list', (users) => {
                document.getElementById('onlineCount').innerText = users.length;
            });
            socket.on('user-joined', (data) => addSystemMessage(`${data.userName} katıldı`));
            socket.on('user-left', (data) => addSystemMessage(`${data.userName} ayrıldı`));
            socket.on('new-message', addMessage);
            socket.on('message-deleted', (id) => {
                const el = document.querySelector(`.message[data-id="${id}"]`);
                if (el) el.remove();
            });
            socket.on('reaction-updated', ({ messageId, reactions }) => {
                const msgDiv = document.querySelector(`.message[data-id="${messageId}"]`);
                if (msgDiv) {
                    let reactDiv = msgDiv.querySelector('.message-reactions');
                    if (!reactDiv) {
                        reactDiv = document.createElement('div');
                        reactDiv.className = 'message-reactions';
                        msgDiv.querySelector('.message-content').appendChild(reactDiv);
                    }
                    reactDiv.innerHTML = '';
                    const grouped = {};
                    reactions.forEach(r => grouped[r.emoji] = (grouped[r.emoji]||0)+1);
                    for (const [emoji, count] of Object.entries(grouped)) {
                        const span = document.createElement('span');
                        span.className = 'reaction-badge';
                        span.innerText = `${emoji} ${count}`;
                        span.onclick = (e) => { e.stopPropagation(); addReaction(messageId, emoji); };
                        reactDiv.appendChild(span);
                    }
                }
            });
            socket.on('secure-photo-data', ({ imageUrl }) => {
                showFullscreenImage(imageUrl, true);
            });
            socket.on('emergency-bomb', (fakeScore) => {
                document.getElementById('chatScreen').classList.remove('active');
                document.getElementById('gameScreen').classList.add('active');
                resetGame();
                document.getElementById('currentScore').innerText = fakeScore;
                document.getElementById('gameOverMessage').classList.remove('hidden');
                document.getElementById('gameOverMessage').innerText = `💣 Acil Durum! Sahte Skor: ${fakeScore}`;
                addSystemMessage('💣 Acil durum bombası! Tüm mesajlar silindi.');
                document.getElementById('chatMessages').innerHTML = '';
            });
            socket.on('video-uploaded', ({ url, title }) => {
                updateVideoUI({ type: 'upload', url, title });
            });
            socket.on('video-deleted', () => {
                const vc = document.getElementById('videoContainer');
                if (vc) vc.remove();
                const noVideo = document.getElementById('noVideo');
                if (noVideo) noVideo.classList.remove('hidden');
            });
            socket.on('video-visibility', (visible) => toggleVideoSection(visible));
            socket.on('stickers-updated', (stickers) => updateStickerPanel(stickers));
        }

        function addMessage(msg) {
            const isOwn = msg.deviceId === deviceId;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.setAttribute('data-id', msg.id);
            let content = `<div class="message-content">`;
            if (msg.replyTo) {
                content += `<div class="reply-indicator"><i class="fas fa-reply"></i> ${escapeHtml(msg.replyTo.userName)}: ${escapeHtml(msg.replyTo.text)}</div>`;
            }
            if (msg.type === 'text') content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            else if (msg.type === 'sticker') content += `<img src="${msg.fileUrl}" class="message-image" style="width:100px; height:auto;" onclick="showFullscreenImage('${msg.fileUrl}', false)">`;
            else if (msg.type === 'image') {
                if (msg.isSecure) {
                    content += `<button onclick="viewSecurePhoto('${msg.secureId}')" class="action-btn" style="background:#ff4757; padding:8px 16px; border-radius:20px;">🔒 Tek Kullanımlık Fotoğrafı Görüntüle (8sn)</button>`;
                } else {
                    content += `<img src="${msg.fileUrl}" class="message-image" onclick="showFullscreenImage('${msg.fileUrl}', false)" oncontextmenu="return false">`;
                }
            }
            else if (msg.type === 'video') {
                content += `<div class="message-video"><video controls controlsList="nodownload" src="${msg.fileUrl}" oncontextmenu="return false"></video></div>`;
            }
            else if (msg.type === 'audio') {
                content += `<audio controls controlsList="nodownload" src="${msg.fileUrl}"></audio>`;
            }
            if (msg.text && msg.type !== 'text') content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            content += `<div class="message-time">${msg.time}</div>`;
            if (msg.reactions && msg.reactions.length) {
                const grouped = {};
                msg.reactions.forEach(r => grouped[r.emoji] = (grouped[r.emoji]||0)+1);
                content += `<div class="message-reactions">`;
                for (const [emoji, count] of Object.entries(grouped)) {
                    content += `<span class="reaction-badge" data-emoji="${emoji}">${emoji} ${count}</span>`;
                }
                content += `</div>`;
            }
            content += `</div>`;
            div.innerHTML = content;
            if (!isOwn) div.innerHTML = `<div class="message-sender">${escapeHtml(msg.userName)}</div>` + div.innerHTML;
            document.getElementById('chatMessages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            div.querySelectorAll('.reaction-badge').forEach(badge => {
                badge.onclick = (e) => { e.stopPropagation(); addReaction(msg.id, badge.getAttribute('data-emoji')); };
            });
            div.addEventListener('contextmenu', (e) => { e.preventDefault(); showMessageActions(msg); });
        }

        function addReaction(messageId, emoji) {
            socket.emit('add-reaction', { messageId, emoji });
        }

        function showMessageActions(msg) {
            const action = confirm(`${msg.userName}: "${msg.text?.substring(0,30)}" - Yanıtla (Tamam) / Sil (İptal)`);
            if (action) {
                const replyText = prompt('Yanıtınız:');
                if (replyText) socket.emit('reply-message', { replyToId: msg.id, text: replyText, type: 'text' });
            } else {
                if (msg.deviceId === deviceId && confirm('Bu mesajı silmek istediğinize emin misiniz?')) {
                    socket.emit('delete-message', { messageId: msg.id });
                }
            }
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function viewSecurePhoto(secureId) {
            socket.emit('view-secure-photo', { secureId });
        }

        function showFullscreenImage(url, isSecure = false) {
            const modal = document.getElementById('fullscreenModal');
            const img = document.getElementById('fullscreenImage');
            const timerDiv = document.getElementById('secureTimer');
            img.src = url;
            modal.classList.remove('hidden');
            if (isSecure) {
                timerDiv.classList.remove('hidden');
                let seconds = 8;
                timerDiv.innerText = `${seconds} saniye`;
                const interval = setInterval(() => {
                    seconds--;
                    timerDiv.innerText = `${seconds} saniye`;
                    if (seconds <= 0) {
                        clearInterval(interval);
                        modal.classList.add('hidden');
                        timerDiv.classList.add('hidden');
                        img.src = '';
                    }
                }, 1000);
            } else {
                timerDiv.classList.add('hidden');
            }
        }
        document.getElementById('closeFullscreenBtn').onclick = () => {
            document.getElementById('fullscreenModal').classList.add('hidden');
            document.getElementById('fullscreenImage').src = '';
            document.getElementById('secureTimer').classList.add('hidden');
        };
        window.showFullscreenImage = showFullscreenImage;

        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) {
                socket.emit('send-message', { text, type: 'text' });
                messageInput.value = '';
            }
        };
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

        const stickerBtn = document.getElementById('stickerBtn');
        const stickerPanel = document.getElementById('stickerPanel');
        stickerBtn.onclick = () => stickerPanel.classList.toggle('hidden');
        function updateStickerPanel(stickers) {
            currentStickers = stickers;
            const grid = document.getElementById('stickerGrid');
            grid.innerHTML = '';
            stickers.forEach(s => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                if (s.startsWith('http')) {
                    const img = document.createElement('img');
                    img.src = s;
                    img.style.width = '100%';
                    img.style.borderRadius = '12px';
                    div.appendChild(img);
                } else {
                    div.innerText = s;
                }
                div.onclick = () => socket.emit('send-sticker', { stickerUrl: s });
                grid.appendChild(div);
            });
        }
        document.getElementById('addStickerBtn').onclick = () => {
            const input = document.getElementById('stickerImageInput');
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const newStickers = [...currentStickers, ev.target.result];
                        socket.emit('save-stickers', { stickers: newStickers });
                    };
                    reader.readAsDataURL(file);
                }
                input.value = '';
            };
            input.click();
        };

        const photoBtn = document.getElementById('photoBtn');
        const imageInput = document.getElementById('imageFileInput');
        photoBtn.onclick = () => {
            const isSecure = confirm('Tek kullanımlık fotoğraf gönder? (8 saniye)');
            imageInput.dataset.secure = isSecure;
            imageInput.click();
        };
        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    socket.emit('send-message', {
                        text: '',
                        type: 'image',
                        fileUrl: ev.target.result,
                        isSecure: imageInput.dataset.secure === 'true'
                    });
                };
                reader.readAsDataURL(file);
            }
            imageInput.value = '';
        };

        const micBtn = document.getElementById('micBtn');
        let mediaRecorder, audioChunks;
        micBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                micBtn.style.background = '';
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = ev => socket.emit('send-message', { text: '', type: 'audio', fileUrl: ev.target.result });
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                micBtn.style.background = '#ff4757';
                setTimeout(() => { if (mediaRecorder?.state === 'recording') mediaRecorder.stop(); }, 10000);
            } catch(err) { alert('Mikrofon erişimi yok'); }
        };

        const videoBtn = document.getElementById('videoBtn');
        const videoFileInput = document.getElementById('videoFileInput');
        videoBtn.onclick = () => videoFileInput.click();
        videoFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.size <= 50*1024*1024) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const base64 = ev.target.result.split(',')[1];
                    socket.emit('upload-video', { fileBase64: base64, title: file.name, mimeType: file.type });
                };
                reader.readAsDataURL(file);
            } else alert('Video max 50MB');
            videoFileInput.value = '';
        };

        function updateVideoUI(video) {
            let container = document.getElementById('videoContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'videoContainer';
                container.style.margin = '10px';
                document.getElementById('chatMessages').before(container);
            }
            if (video.type === 'upload') {
                container.innerHTML = `<div style="background:#000; border-radius:16px; padding:8px;"><video controls controlsList="nodownload" src="${video.url}" style="width:100%; border-radius:12px;" oncontextmenu="return false"></video><div style="text-align:center; margin-top:5px;">${escapeHtml(video.title)}</div><button id="closeVideoBtn" style="background:#ff4757; border:none; color:white; padding:4px 12px; border-radius:20px; margin-top:5px;">Kapat</button></div>`;
                document.getElementById('closeVideoBtn')?.addEventListener('click', () => socket.emit('delete-video'));
            }
        }
        function toggleVideoSection(visible) {
            const vc = document.getElementById('videoContainer');
            if (vc) vc.style.display = visible ? 'block' : 'none';
        }

        document.getElementById('backToGameBtn').onclick = () => {
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            resetGame();
        };
        let wasInChat = false;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                wasInChat = document.getElementById('chatScreen').classList.contains('active');
            } else {
                if (wasInChat) {
                    document.getElementById('chatScreen').classList.remove('active');
                    document.getElementById('gameScreen').classList.add('active');
                    resetGame();
                    const pwd = prompt('Tekrar şifre girin:');
                    if (pwd === 'efkaza7634') {
                        const userName = localStorage.getItem('userName');
                        const userPhoto = localStorage.getItem('userPhoto');
                        connectAndJoin(pwd, userName, userPhoto);
                    }
                }
            }
        });

        function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) || ''; }
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
            return outputArray;
        }
    </script>
</body>
</html>
