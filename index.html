<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Sohbet - Canlı Mesajlaşma</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            max-height: 900px;
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        #loginScreen h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #loginScreen .sub {
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 16px;
            color: #fff;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102,126,234,0.2);
        }

        .login-box input::placeholder {
            color: #666;
        }

        .avatar-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0 15px;
            justify-content: center;
        }

        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
        }

        .avatar-option:hover {
            transform: scale(1.1);
        }

        .avatar-option.selected {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        #chatScreen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .chat-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .left .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .chat-header .left .info h3 {
            font-size: 1rem;
            color: #fff;
        }

        .chat-header .left .info small {
            color: #28a745;
            font-size: 0.75rem;
        }

        .chat-header .right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-header .right button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .chat-header .right button:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .online-users {
            display: flex;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px 4px 6px;
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .online-user .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
        }

        .online-user .avatar-small {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: rgba(0,0,0,0.1);
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .message-wrapper {
            display: flex;
            gap: 10px;
            margin: 2px 0;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.own {
            flex-direction: row-reverse;
        }

        .message-wrapper .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .message-wrapper .msg-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-wrapper .msg-username {
            font-size: 0.7rem;
            color: #888;
            padding-left: 4px;
            font-weight: 600;
        }

        .message-wrapper.own .msg-username {
            text-align: right;
            padding-right: 4px;
            padding-left: 0;
        }

        .message-wrapper .msg-bubble {
            padding: 8px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .message-wrapper:not(.own) .msg-bubble {
            border-bottom-left-radius: 4px;
            background: rgba(255,255,255,0.06);
        }

        .message-wrapper.own .msg-bubble {
            border-bottom-right-radius: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .message-wrapper .msg-bubble .msg-time {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            margin-left: 8px;
        }

        .message-wrapper.own .msg-bubble .msg-time {
            color: rgba(255,255,255,0.5);
        }

        .message-wrapper .msg-bubble .msg-actions {
            display: none;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .message-wrapper:hover .msg-bubble .msg-actions {
            display: flex;
        }

        .message-wrapper .msg-bubble .msg-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #aaa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .message-wrapper .msg-bubble .msg-actions button:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .message-wrapper .msg-bubble .reactions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .message-wrapper .msg-bubble .reactions .reaction {
            background: rgba(255,255,255,0.08);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-wrapper .msg-bubble .reactions .reaction:hover {
            background: rgba(255,255,255,0.15);
        }

        .message-wrapper .msg-bubble .reactions .reaction .count {
            color: #888;
            font-size: 0.65rem;
        }

        .message-wrapper .msg-bubble .reply-to {
            font-size: 0.75rem;
            color: #667eea;
            background: rgba(102,126,234,0.1);
            padding: 4px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            border-left: 3px solid #667eea;
        }

        .message-wrapper .msg-bubble .deleted {
            color: #666;
            font-style: italic;
            font-size: 0.85rem;
        }

        .message-wrapper .msg-bubble .edited-badge {
            font-size: 0.6rem;
            color: #888;
            margin-left: 4px;
        }

        .system-message {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            padding: 6px 0;
            font-style: italic;
        }

        .message-wrapper .msg-bubble .file-preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
            margin: 4px 0;
        }

        .message-wrapper .msg-bubble .file-preview img,
        .message-wrapper .msg-bubble .file-preview video {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
        }

        .message-wrapper .msg-bubble .file-name {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }

        .message-wrapper .msg-bubble .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 150px;
        }

        .message-wrapper .msg-bubble .voice-message .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #667eea;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .message-wrapper .msg-bubble .voice-message .play-btn:hover {
            transform: scale(1.1);
        }

        .message-wrapper .msg-bubble .voice-message .wave {
            flex: 1;
            height: 30px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .message-wrapper .msg-bubble .voice-message .wave span {
            width: 3px;
            background: #667eea;
            border-radius: 2px;
            animation: wave 1s infinite;
        }

        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(1) { animation-delay: 0s; height: 8px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(2) { animation-delay: 0.1s; height: 14px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(3) { animation-delay: 0.2s; height: 10px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(4) { animation-delay: 0.3s; height: 20px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(5) { animation-delay: 0.4s; height: 12px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(6) { animation-delay: 0.5s; height: 18px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(7) { animation-delay: 0.6s; height: 8px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(8) { animation-delay: 0.7s; height: 16px; }
        .message-wrapper .msg-bubble .voice-message .wave span:nth-child(9) { animation-delay: 0.8s; height: 10px; }

        @keyframes wave {
            0%, 100% { height: 6px; }
            50% { height: 22px; }
        }

        .message-wrapper .msg-bubble .voice-message .duration {
            font-size: 0.8rem;
            color: #888;
            min-width: 30px;
        }

        .chat-input-area {
            padding: 10px 16px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .chat-input-area .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input-area .input-row input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input-area .input-row input:focus {
            background: rgba(255,255,255,0.1);
        }

        .chat-input-area .input-row input::placeholder {
            color: #555;
        }

        .chat-input-area .input-row .toolbar-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .chat-input-area .input-row .toolbar-btn:hover {
            background: rgba(255,255,255,0.05);
            color: #aaa;
        }

        .chat-input-area .input-row .send-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chat-input-area .input-row .send-btn:hover {
            transform: scale(1.05);
        }

        .chat-input-area .toolbar-extra {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            padding: 6px 0;
        }

        .chat-input-area .toolbar-extra.active {
            display: flex;
        }

        .chat-input-area .toolbar-extra .extra-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .chat-input-area .toolbar-extra .extra-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .emoji-picker {
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 4px;
            max-width: 300px;
        }

        .emoji-picker.active {
            display: flex;
        }

        .emoji-picker span {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .emoji-picker span:hover {
            background: rgba(255,255,255,0.1);
        }

        .theme-dark {
            background: #16213e;
        }
        .theme-dark .messages-area {
            background: rgba(0,0,0,0.1);
        }

        .theme-light {
            background: #f0f2f5;
        }
        .theme-light .messages-area {
            background: #e8eaed;
        }
        .theme-light .chat-header {
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .theme-light .chat-header .left .info h3 {
            color: #1a1a2e;
        }
        .theme-light .message-wrapper .msg-bubble {
            background: #fff;
            color: #1a1a2e;
        }
        .theme-light .message-wrapper.own .msg-bubble {
            background: #667eea;
            color: #fff;
        }
        .theme-light .chat-input-area {
            background: #fff;
            border-top: 1px solid #ddd;
        }
        .theme-light .chat-input-area .input-row input {
            background: #f0f2f5;
            color: #1a1a2e;
        }
        .theme-light .online-users {
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .theme-light .online-user {
            background: #f0f2f5;
        }

        .theme-dark-blue {
            background: #0a0e1a;
        }
        .theme-dark-blue .messages-area {
            background: #0d1117;
        }
        .theme-dark-blue .chat-header {
            background: #161b22;
        }
        .theme-dark-blue .chat-input-area {
            background: #161b22;
        }

        .voice-recording-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 53, 69, 0.95);
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1.1rem;
            z-index: 9999;
            animation: pulse 0.8s infinite;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 10px 40px rgba(220, 53, 69, 0.5);
            backdrop-filter: blur(10px);
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.03); }
        }

        @media (max-width: 768px) {
            .app-container {
                max-height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }
            .message-wrapper .msg-content {
                max-width: 85%;
            }
            .chat-header .left .info h3 {
                font-size: 0.9rem;
            }
            #loginScreen h1 {
                font-size: 2rem;
            }
            .login-box {
                padding: 20px;
            }
            .voice-recording-indicator {
                bottom: 80px;
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .message-wrapper .msg-content {
                max-width: 90%;
            }
            .chat-input-area .input-row input {
                font-size: 14px;
                padding: 8px 12px;
            }
            .chat-input-area .input-row .send-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <h1>💬 Sohbet</h1>
        <p class="sub">Canlı Mesajlaşma</p>
        <div class="login-box">
            <input type="text" id="usernameInput" placeholder="Kullanıcı adı (2-20 karakter)" maxlength="20">
            <div style="color:#888; font-size:0.8rem; margin:5px 0 8px;">Profil Fotoğrafı Seç</div>
            <div class="avatar-select" id="avatarSelect">
                <div class="avatar-option selected" data-avatar="😀">😀</div>
                <div class="avatar-option" data-avatar="😎">😎</div>
                <div class="avatar-option" data-avatar="🤩">🤩</div>
                <div class="avatar-option" data-avatar="🦊">🦊</div>
                <div class="avatar-option" data-avatar="🐱">🐱</div>
                <div class="avatar-option" data-avatar="🚀">🚀</div>
                <div class="avatar-option" data-avatar="🎮">🎮</div>
                <div class="avatar-option" data-avatar="👑">👑</div>
                <div class="avatar-option" data-avatar="🌟">🌟</div>
                <div class="avatar-option" data-avatar="💪">💪</div>
            </div>
            <button class="btn" onclick="register()">🚀 SOHBETE GİR</button>
            <div style="margin-top:12px; text-align:center; color:#555; font-size:0.8rem;">
                Admin girişi için şifre: <strong style="color:#ffd700;">efkaza7634</strong>
            </div>
            <input type="password" id="adminPasswordInput" placeholder="Admin şifresi (isteğe bağlı)" style="margin-top:8px;">
        </div>
    </div>

    <!-- SOYBET EKRANI -->
    <div id="chatScreen">
        <div class="chat-header">
            <div class="left">
                <div class="avatar" id="myAvatar">😀</div>
                <div class="info">
                    <h3 id="myUsername">Kullanıcı</h3>
                    <small>🟢 Çevrimiçi</small>
                </div>
            </div>
            <div class="right">
                <button onclick="toggleTheme()" title="Tema Değiştir">🎨</button>
                <button onclick="clearChat()" title="Sohbeti Temizle (Admin)">🗑️</button>
                <button onclick="logout()" title="Çıkış Yap">🚪</button>
            </div>
        </div>

        <div class="online-users" id="onlineUsers"></div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="chat-input-area">
            <div class="input-row">
                <button class="toolbar-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
                <button class="toolbar-btn" onclick="toggleTools()" title="Dosya">📎</button>
                <button class="toolbar-btn" onclick="startVoice()" title="Ses Kaydı" id="voiceBtn">🎤</button>
                <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." 
                       onkeypress="if(event.key==='Enter') sendMessage()"
                       oninput="typingNotification()">
                <button class="send-btn" onclick="sendMessage()">GÖNDER</button>
            </div>
            
            <div class="emoji-picker" id="emojiPicker">
                <span onclick="addEmoji('😊')">😊</span>
                <span onclick="addEmoji('😂')">😂</span>
                <span onclick="addEmoji('❤️')">❤️</span>
                <span onclick="addEmoji('😍')">😍</span>
                <span onclick="addEmoji('👍')">👍</span>
                <span onclick="addEmoji('👎')">👎</span>
                <span onclick="addEmoji('🔥')">🔥</span>
                <span onclick="addEmoji('💀')">💀</span>
                <span onclick="addEmoji('🎉')">🎉</span>
                <span onclick="addEmoji('🤔')">🤔</span>
                <span onclick="addEmoji('😭')">😭</span>
                <span onclick="addEmoji('🥳')">🥳</span>
                <span onclick="addEmoji('😡')">😡</span>
                <span onclick="addEmoji('👀')">👀</span>
                <span onclick="addEmoji('💯')">💯</span>
                <span onclick="addEmoji('🚨')">🚨</span>
                <span onclick="addEmoji('✨')">✨</span>
                <span onclick="addEmoji('💔')">💔</span>
                <span onclick="addEmoji('💖')">💖</span>
                <span onclick="addEmoji('👋')">👋</span>
            </div>
            
            <div class="toolbar-extra" id="toolbarExtra">
                <button class="extra-btn" onclick="document.getElementById('fileInput').click()">📷 Fotoğraf</button>
                <button class="extra-btn" onclick="document.getElementById('fileInput').click()">🎥 Video</button>
                <button class="extra-btn" onclick="document.getElementById('fileInput').click()">📁 Dosya</button>
                <button class="extra-btn" onclick="searchGif()">🎬 GIF</button>
                <button class="extra-btn" onclick="createSticker()">💠 Çıkartma</button>
                <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,.pdf,.doc,.docx,.zip" multiple>
            </div>
        </div>
    </div>
</div>

<script>
    // ================================================================
    // SOCKET BAĞLANTISI
    // ================================================================
    const socket = io();
    let currentUser = null;
    let selectedAvatar = '😀';
    let currentTheme = 'dark';
    let isTyping = false;
    let typingTimeout = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let recordingStartTime = 0;

    // DOM ELEMENTLERİ
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const usernameInput = document.getElementById('usernameInput');
    const adminPasswordInput = document.getElementById('adminPasswordInput');
    const messageInput = document.getElementById('messageInput');
    const messagesArea = document.getElementById('messagesArea');
    const onlineUsers = document.getElementById('onlineUsers');
    const myAvatar = document.getElementById('myAvatar');
    const myUsername = document.getElementById('myUsername');

    // AVATAR SEÇİMİ
    document.querySelectorAll('.avatar-option').forEach(el => {
        el.addEventListener('click', function() {
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            this.classList.add('selected');
            selectedAvatar = this.dataset.avatar;
        });
    });

    // ================================================================
    // SOCKET OLAYLARI
    // ================================================================

    socket.on('registerSuccess', (data) => {
        console.log('✅ Kayıt başarılı:', data);
        currentUser = data.user;
        loginScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        myAvatar.textContent = currentUser.avatar;
        myUsername.textContent = currentUser.username;
        if (data.history) data.history.forEach(msg => addMessage(msg));
        updateOnlineUsers(data.onlineUsers);
        showNotification('Sohbete hoşgeldin!');
        setTimeout(scrollToBottom, 100);
    });

    socket.on('newMessage', (data) => {
        addMessage(data);
        scrollToBottom();
    });

    socket.on('messageEdited', (data) => {
        document.querySelectorAll(`[data-message-id="${data.messageId}"]`).forEach(el => {
            const textEl = el.querySelector('.msg-text');
            if (textEl) {
                textEl.textContent = data.newMessage;
                const badge = el.querySelector('.edited-badge');
                if (badge) badge.textContent = ' (düzenlendi)';
            }
        });
    });

    socket.on('messageDeleted', (data) => {
        document.querySelectorAll(`[data-message-id="${data.messageId}"]`).forEach(el => {
            const textEl = el.querySelector('.msg-text');
            if (textEl) {
                textEl.textContent = 'Bu mesaj silindi';
                textEl.className = 'deleted';
            }
            const actions = el.querySelector('.msg-actions');
            if (actions) actions.innerHTML = '';
        });
    });

    socket.on('reactionUpdated', (data) => {
        document.querySelectorAll(`[data-message-id="${data.messageId}"]`).forEach(el => {
            const reactionContainer = el.querySelector('.reactions');
            if (reactionContainer) renderReactions(reactionContainer, data.reactions);
        });
    });

    socket.on('userJoined', (data) => {
        addSystemMessage(`${data.username} sohbete katıldı!`);
        updateOnlineUsers();
    });

    socket.on('userLeft', (data) => {
        addSystemMessage(`${data.username} ayrıldı.`);
        updateOnlineUsers();
    });

    socket.on('onlineUsersUpdate', (data) => updateOnlineUsers(data));

    socket.on('userUpdated', (data) => {
        if (data.id === currentUser?.id) {
            currentUser = data;
            myAvatar.textContent = data.avatar;
            myUsername.textContent = data.username;
        }
        updateOnlineUsers();
    });

    socket.on('userTyping', (data) => {
        let typingIndicator = document.getElementById('typingIndicator');
        if (data.isTyping) {
            if (!typingIndicator) {
                const el = document.createElement('div');
                el.id = 'typingIndicator';
                el.className = 'system-message';
                el.textContent = `${data.username} yazıyor...`;
                messagesArea.appendChild(el);
                scrollToBottom();
            } else {
                typingIndicator.textContent = `${data.username} yazıyor...`;
            }
        } else {
            if (typingIndicator) typingIndicator.remove();
        }
    });

    socket.on('chatCleared', (data) => {
        messagesArea.innerHTML = '';
        addSystemMessage(`🧹 Sohbet ${data.clearedBy} tarafından temizlendi.`);
    });

    socket.on('gifResults', (data) => {
        if (data.results.length === 0) {
            showNotification('GIF bulunamadı!', 'error');
            return;
        }
        const gifUrl = data.results[0];
        socket.emit('sendFile', { url: gifUrl, type: 'gif', name: 'gif.gif' });
        showNotification('GIF gönderildi!');
    });

    socket.on('themeChanged', (data) => applyTheme(data.theme));

    socket.on('error', (msg) => showNotification(msg, 'error'));

    // ================================================================
    // İSTEMCİ FONKSİYONLARI
    // ================================================================

    function register() {
        const username = usernameInput.value.trim();
        if (!username || username.length < 2) {
            showNotification('Kullanıcı adı en az 2 karakter!', 'error');
            return;
        }
        const password = adminPasswordInput.value.trim();
        socket.emit('register', { username, avatar: selectedAvatar, password });
    }

    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        socket.emit('sendMessage', { message: text });
        messageInput.value = '';
        isTyping = false;
        socket.emit('typing', { isTyping: false });
    }

    function addMessage(data) {
        const isOwn = data.username === currentUser?.username;
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${isOwn ? 'own' : ''}`;
        wrapper.dataset.messageId = data.id;
        
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = data.avatar || '😀';
        
        const content = document.createElement('div');
        content.className = 'msg-content';
        
        const username = document.createElement('div');
        username.className = 'msg-username';
        username.textContent = data.username;
        if (data.isAdmin) username.textContent += ' 👑';
        
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        
        if (data.replyTo) {
            const reply = document.createElement('div');
            reply.className = 'reply-to';
            reply.textContent = `↩️ ${data.replyTo.username}: ${data.replyTo.message.substring(0, 50)}${data.replyTo.message.length > 50 ? '...' : ''}`;
            bubble.appendChild(reply);
        }
        
        // Ses mesajı
        if (data.type === 'voice') {
            const voiceDiv = document.createElement('div');
            voiceDiv.className = 'voice-message';
            voiceDiv.innerHTML = `
                <button class="play-btn" onclick="playVoice('${data.message}', this)">▶</button>
                <div class="wave">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                </div>
                <span class="duration">${data.duration || 0}s</span>
            `;
            bubble.appendChild(voiceDiv);
        } else {
            const text = document.createElement('span');
            text.className = 'msg-text';
            text.textContent = data.deleted ? 'Bu mesaj silindi' : data.message;
            if (data.deleted) text.className = 'msg-text deleted';
            bubble.appendChild(text);
        }
        
        const time = document.createElement('span');
        time.className = 'msg-time';
        const date = new Date(data.timestamp);
        time.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        bubble.appendChild(time);
        
        if (data.edited) {
            const badge = document.createElement('span');
            badge.className = 'edited-badge';
            badge.textContent = ' (düzenlendi)';
            bubble.appendChild(badge);
        }
        
        if (data.reactions && data.reactions.length > 0) {
            const reactions = document.createElement('div');
            reactions.className = 'reactions';
            renderReactions(reactions, data.reactions);
            bubble.appendChild(reactions);
        }
        
        if (!data.deleted) {
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            
            const replyBtn = document.createElement('button');
            replyBtn.textContent = '↩️ Yanıtla';
            replyBtn.onclick = () => {
                const reply = prompt(`↩️ ${data.username} mesajına yanıt:`, '');
                if (reply && reply.trim()) {
                    socket.emit('replyMessage', { messageId: data.id, replyMessage: reply.trim() });
                }
            };
            
            const reactBtn = document.createElement('button');
            reactBtn.textContent = '😊 Tepki';
            reactBtn.onclick = () => showEmojiPickerForReaction(data.id);
            
            const editBtn = document.createElement('button');
            editBtn.textContent = '✏️ Düzenle';
            editBtn.onclick = () => {
                const current = data.message;
                const newText = prompt('Mesajı düzenle:', current);
                if (newText && newText.trim() && newText.trim() !== current) {
                    socket.emit('editMessage', { messageId: data.id, newMessage: newText.trim() });
                }
            };
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑️ Sil';
            deleteBtn.onclick = () => {
                if (confirm('Bu mesajı silmek istediğine emin misin?')) {
                    socket.emit('deleteMessage', { messageId: data.id });
                }
            };
            
            actions.appendChild(replyBtn);
            actions.appendChild(reactBtn);
            if (isOwn || currentUser?.isAdmin) {
                actions.appendChild(editBtn);
                actions.appendChild(deleteBtn);
            }
            
            bubble.appendChild(actions);
        }
        
        content.appendChild(username);
        content.appendChild(bubble);
        wrapper.appendChild(avatar);
        wrapper.appendChild(content);
        messagesArea.appendChild(wrapper);
    }

    function renderReactions(container, reactions) {
        container.innerHTML = '';
        const grouped = {};
        reactions.forEach(r => {
            if (!grouped[r.emoji]) grouped[r.emoji] = [];
            grouped[r.emoji].push(r.username);
        });
        Object.entries(grouped).forEach(([emoji, users]) => {
            const el = document.createElement('span');
            el.className = 'reaction';
            el.innerHTML = `${emoji} <span class="count">${users.length}</span>`;
            el.title = users.join(', ');
            el.onclick = () => {
                const msgId = container.closest('.message-wrapper')?.dataset.messageId;
                if (msgId) socket.emit('addReaction', { messageId: msgId, emoji: emoji });
            };
            container.appendChild(el);
        });
    }

    function addSystemMessage(text) {
        const el = document.createElement('div');
        el.className = 'system-message';
        el.textContent = text;
        messagesArea.appendChild(el);
        scrollToBottom();
    }

    function updateOnlineUsers(users) {
        if (!users) return;
        onlineUsers.innerHTML = '';
        users.forEach(user => {
            const el = document.createElement('div');
            el.className = 'online-user';
            el.innerHTML = `
                <span class="dot"></span>
                <span class="avatar-small">${user.avatar || '😀'}</span>
                <span>${user.username} ${user.isAdmin ? '👑' : ''}</span>
            `;
            onlineUsers.appendChild(el);
        });
    }

    function showEmojiPickerForReaction(messageId) {
        const emojis = ['😊', '❤️', '😂', '😍', '👍', '👎', '🔥', '💀', '🎉', '🤔', '😭', '🥳', '😡', '👀', '💯'];
        const picker = document.createElement('div');
        picker.style.cssText = `
            position: fixed; bottom: 80px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.95); padding: 12px; border-radius: 16px;
            display: flex; flex-wrap: wrap; gap: 6px; max-width: 300px;
            border: 1px solid rgba(255,255,255,0.1);
        `;
        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.style.cssText = 'font-size:1.8rem; cursor:pointer; padding:4px; border-radius:6px; transition:all 0.2s;';
            span.textContent = emoji;
            span.onmouseover = () => span.style.background = 'rgba(255,255,255,0.1)';
            span.onmouseout = () => span.style.background = 'transparent';
            span.onclick = () => {
                socket.emit('addReaction', { messageId: messageId, emoji: emoji });
                picker.remove();
            };
            picker.appendChild(span);
        });
        document.body.appendChild(picker);
        setTimeout(() => {
            document.addEventListener('click', function closePicker(e) {
                if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', closePicker); }
            });
        }, 100);
    }

    function addEmoji(emoji) {
        messageInput.value += emoji;
        messageInput.focus();
    }

    function toggleEmoji() {
        document.getElementById('emojiPicker').classList.toggle('active');
    }

    function toggleTools() {
        document.getElementById('toolbarExtra').classList.toggle('active');
    }

    // ================================================================
    // SES KAYDI (TAM ÇALIŞAN)
    // ================================================================

    function startVoice() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showNotification('⚠️ Tarayıcınız ses kaydını desteklemiyor!', 'error');
            return;
        }
        if (isRecording) { stopVoiceRecording(); return; }
        
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];
                isRecording = true;
                recordingStartTime = Date.now();
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = function() {
                        const duration = Math.round((Date.now() - recordingStartTime) / 1000);
                        socket.emit('sendVoice', { voiceData: reader.result, duration: duration });
                        showNotification('🎤 Ses mesajı gönderildi! (' + duration + 's)', 'success');
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                    isRecording = false;
                    document.querySelector('.voice-recording-indicator')?.remove();
                };
                
                mediaRecorder.start(100);
                
                const indicator = document.createElement('div');
                indicator.className = 'voice-recording-indicator';
                indicator.innerHTML = `
                    <span style="font-size:1.5rem;">🔴</span>
                    <span>Kaydediliyor... <span id="recordingTimer">0s</span></span>
                    <button onclick="stopVoiceRecording()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 16px;border-radius:20px;cursor:pointer;font-weight:bold;">⏹ DURDUR</button>
                `;
                document.body.appendChild(indicator);
                
                const timerInterval = setInterval(() => {
                    const elapsed = Math.round((Date.now() - recordingStartTime) / 1000);
                    const timerEl = document.getElementById('recordingTimer');
                    if (timerEl) timerEl.textContent = elapsed + 's';
                    if (elapsed >= 60) { stopVoiceRecording(); clearInterval(timerInterval); }
                }, 500);
                window._voiceTimerInterval = timerInterval;
                
                showNotification('🎤 Kayıt başladı... (maks. 60s)', 'success');
            })
            .catch(err => {
                console.error('Mikrofon hatası:', err);
                showNotification('⚠️ Mikrofon erişimi reddedildi!', 'error');
            });
    }

    function stopVoiceRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            clearInterval(window._voiceTimerInterval);
            document.querySelector('.voice-recording-indicator')?.remove();
        }
    }

    function playVoice(url, btn) {
        const audio = new Audio(url);
        audio.onplay = () => { btn.textContent = '⏸'; btn.style.background = '#dc3545'; };
        audio.onended = () => { btn.textContent = '▶'; btn.style.background = '#667eea'; };
        audio.play();
    }

    // ================================================================
    // DİĞER FONKSİYONLAR
    // ================================================================

    function searchGif() {
        const search = prompt('GIF arama (boş bırak rastgele):');
        socket.emit('searchGif', { searchTerm: search || '' });
    }

    function createSticker() {
        const text = prompt('Çıkartma metni:');
        if (text && text.trim()) {
            socket.emit('createSticker', { stickerData: `💠 ${text.trim()}` });
        }
    }

    function typingNotification() {
        if (!isTyping) {
            isTyping = true;
            socket.emit('typing', { isTyping: true });
        }
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            isTyping = false;
            socket.emit('typing', { isTyping: false });
        }, 1000);
    }

    function toggleTheme() {
        const themes = ['dark', 'light', 'dark-blue'];
        const currentIndex = themes.indexOf(currentTheme);
        const nextIndex = (currentIndex + 1) % themes.length;
        currentTheme = themes[nextIndex];
        socket.emit('changeTheme', { theme: currentTheme });
        applyTheme(currentTheme);
    }

    function applyTheme(theme) {
        const app = document.getElementById('app');
        app.className = '';
        app.classList.add(`theme-${theme}`);
        currentTheme = theme;
        showNotification(`Tema: ${theme}`);
    }

    function clearChat() {
        if (!currentUser?.isAdmin) {
            showNotification('Sadece admin sohbeti temizleyebilir!', 'error');
            return;
        }
        if (confirm('Tüm sohbeti temizlemek istediğine emin misin?')) {
            socket.emit('sendMessage', { message: '🚨' });
        }
    }

    function logout() {
        if (confirm('Çıkış yapmak istediğine emin misin?')) {
            location.reload();
        }
    }

    function showNotification(message, type = 'info') {
        const el = document.createElement('div');
        el.style.cssText = `
            position: fixed; top: 20px; right: 20px; 
            padding: 12px 20px; border-radius: 10px; 
            background: rgba(0,0,0,0.9); color: #fff; 
            z-index: 9999; max-width: 350px;
            border-left: 4px solid ${type === 'error' ? '#dc3545' : '#28a745'};
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        `;
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.3s';
            setTimeout(() => el.remove(), 300);
        }, 3000);
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // DOSYA YÜKLEME
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const files = this.files;
        if (!files.length) return;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const dataUrl = event.target.result;
                const type = file.type.startsWith('image') ? 'image' : 
                             file.type.startsWith('video') ? 'video' : 'file';
                socket.emit('sendFile', { url: dataUrl, type: type, name: file.name });
            };
            reader.readAsDataURL(file);
        });
        this.value = '';
        showNotification(`${files.length} dosya gönderiliyor...`);
    });

    // SAYFA YÜKLENİRKEN
    window.addEventListener('load', () => {
        console.log('💬 Sohbet Uygulaması yüklendi!');
        usernameInput.focus();
        usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
        adminPasswordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
    });
</script>
</body>
</html>
